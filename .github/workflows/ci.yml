# ──────────────────────────────────────────────────────────────
# Marco Extension — CI Pipeline (main branch)
#
# Pipeline structure:
#   1. setup        — checkout, install, lint, test
#   2. build-sdk    — build Marco SDK (dependency for others)
#   3. build-standalone (parallel) — XPath, Macro Controller, Prompts
#   4. build-extension — final Chrome extension build
#
# Performance: Every job caches the pnpm content-addressable store
# AND node_modules keyed on pnpm-lock.yaml, so cached runs install
# in ~10 seconds instead of ~2 minutes. fetch-depth: 1 keeps clones small.
#
# NOTE: No email or notification integrations — by design.
# ──────────────────────────────────────────────────────────────

name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-main-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 0: Spec Links — fail-fast guard, no install needed
  #
  # Runs the strict spec-link checker (no baseline, ignores rot)
  # against every .md file under spec/. Surfaces a Top-N failing-files
  # leaderboard in the GitHub Actions Step Summary and emits inline
  # `::error file=…,line=…::` annotations so each broken link shows
  # up on the PR diff view.
  #
  # This job has NO dependencies — it only needs Node + the repo, so
  # it returns in seconds and blocks the rest of the pipeline before
  # we burn time on installs/builds. The final `build-extension` job
  # also lists this job in its `needs:` so a broken link cannot be
  # merged even if other checks pass.
  # ════════════════════════════════════════════════════════════
  spec-links:
    name: Preflight · Spec Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Strict spec-link check (fails on ANY broken link)
        run: node scripts/report-spec-links-ci.mjs

  # ════════════════════════════════════════════════════════════
  # Job 0a2: Standalone Registry Report — fast-fail orchestration guard
  #
  # Runs `scripts/report-standalone-registry.mjs --strict` so the very
  # first thing visible in the CI log is a checklist of every standalone
  # script and which orchestration source-of-truth files contain it
  # (package.json build scripts, build:extension chain, build-standalone,
  # check-standalone-dist, tsconfig.<name>.json, vite.config.<name>.ts,
  # CI build-<name> job).
  #
  # Strict mode means: if a new bundle is added but only wired into
  # 5 of the 7 required locations (the recurring failure that hid
  # `payment-banner-hider` from CI for several PRs), the missing rows
  # show up as `[X]` AND the job exits 1 with `::error file=…::`
  # annotations on the offending file — no need to chase a downstream
  # "artifact missing" error 8 minutes later.
  #
  # Also writes a markdown matrix to GITHUB_STEP_SUMMARY so the report
  # is one click away from the PR checks tab. Listed in build-extension's
  # `needs:` so a registry gap blocks merge.
  #
  # No install needed — pure Node + repo files. Returns in <1s.
  # ════════════════════════════════════════════════════════════
  report-standalone-registry:
    name: Preflight · Standalone Registry (strict)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Strict standalone-registry check (fails on ANY wiring gap)
        env:
          CI: 'true'
        run: node scripts/report-standalone-registry.mjs --strict


  #
  # Runs `tsc --noEmit` against every standalone-script tsconfig
  # in a single job. Catches TS2304/TS2345/etc errors in seconds
  # — long before the heavier build-* jobs would surface them
  # via `pnpm build:macro-controller` (which also runs LESS,
  # templates, prompts, and vite — masking the type error noise
  # behind 60+ seconds of unrelated work).
  #
  # Caches both pnpm store and node_modules so cached runs install
  # in ~10s. Lists this job in build-extension's `needs:` so a
  # type error blocks merges even if downstream builds are re-run.
  #
  # Why one job, not four: each tsc invocation is ~3–8s. Spinning
  # up four runners would burn more time on container startup +
  # install than the actual checks. Keep them serial in one job.
  # ════════════════════════════════════════════════════════════
  typecheck-standalone:
    name: Preflight · Typecheck (Standalone Scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-typecheck-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-typecheck-

      # ── TypeScript incremental cache ────────────────────────────
      # tsc writes a `.tsbuildinfo` file per project when invoked
      # with `--incremental`. On the next run it skips re-checking
      # files whose inputs haven't changed → 3–5× faster on cache
      # hits. Cache is keyed on the union of every standalone
      # tsconfig + the source trees they cover, so any source or
      # config edit invalidates only when it actually matters.
      # `restore-keys` lets us fall back to the most recent build
      # info even on a partial miss (e.g. one file changed).
      - name: Cache TypeScript incremental build info
        uses: actions/cache@v4
        with:
          path: .cache/tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('tsconfig.sdk.json', 'tsconfig.xpath.json', 'tsconfig.payment-banner-hider.json', 'tsconfig.macro.build.json', 'standalone-scripts/**/*.ts', 'standalone-scripts/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Ensure tsbuildinfo cache dir exists
        run: mkdir -p .cache/tsbuildinfo

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Compile each standalone-script tsconfig with --noEmit and
      # --incremental. The `--tsBuildInfoFile` flag points at a
      # per-project file inside `.cache/tsbuildinfo/` so all four
      # checks share one cache directory (single cache action) but
      # each gets its own buildinfo (no cross-project corruption).
      # Any TS2304 (missing global), TS2345 (bad arg type), etc.
      # still fails the job with inline annotations on the offending
      # line — incremental mode does NOT skip type errors, only
      # already-validated unchanged files.
      - name: Typecheck · Marco SDK
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/sdk.tsbuildinfo -p tsconfig.sdk.json

      - name: Typecheck · XPath
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/xpath.tsbuildinfo -p tsconfig.xpath.json

      - name: Typecheck · Payment Banner Hider
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/payment-banner-hider.tsbuildinfo -p tsconfig.payment-banner-hider.json

      - name: Typecheck · Macro Controller
        run: npx tsc --noEmit --incremental --tsBuildInfoFile .cache/tsbuildinfo/macro.tsbuildinfo -p tsconfig.macro.build.json

  # ════════════════════════════════════════════════════════════
  # Job 0c: ESLint Standalone Scripts — fast-fail lint guard
  #
  # Runs ESLint scoped to standalone-scripts/ (macro-controller,
  # marco-sdk, xpath, payment-banner-hider) with --max-warnings=0
  # so any new warning fails the build. Surfaces violations as
  # inline `::error file=…,line=…,col=…::` GitHub annotations on
  # the PR diff.
  #
  # Why a separate job (vs `setup`'s existing `pnpm run lint`):
  #   - Runs in parallel with setup + typecheck — no waiting for
  #     tests or installs of build deps to surface lint failures.
  #   - Scoped to standalone-scripts/ only — quick (~5–8s after
  #     install) and isolates the noise from React/UI lint output.
  #   - --max-warnings=0 enforces zero-warnings policy
  #     (mem://architecture/linting-policy).
  #
  # Listed in build-extension's needs: so a lint regression
  # blocks merge even if other jobs pass.
  # ════════════════════════════════════════════════════════════
  lint-standalone:
    name: Preflight · ESLint (Standalone Scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-lint-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-lint-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      # Stylish format → human-readable in the Actions log.
      # Compact format → piped to a one-liner that emits GitHub
      # annotations so each violation shows up on the PR diff.
      - name: ESLint · Standalone Scripts (errors + warnings)
        run: npx eslint standalone-scripts --max-warnings=0 --format=stylish

      - name: ESLint · Macro Controller domain-specific guards
        run: pnpm run lint:macro

  # ════════════════════════════════════════════════════════════
  # Job 1: Setup, Lint, Test
  # ════════════════════════════════════════════════════════════
  setup:
    name: Setup · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enforce lowercase .md filenames
        run: |
          VIOLATIONS=$(find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './skipped/*' \
            | grep '[A-Z]' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Uppercase .md filenames found — all .md files must be lowercase hyphen-case:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ All .md filenames are lowercase"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preflight · forbid broken pnpm-dlx-less invocation
        run: node scripts/check-no-pnpm-dlx-less.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-setup-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-setup-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Run root lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

  # ════════════════════════════════════════════════════════════
  # Job 2: Build SDK (dependency for other standalone scripts)
  # ════════════════════════════════════════════════════════════
  build-sdk:
    name: Build · Marco SDK
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-sdk-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-sdk-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Marco SDK
        run: pnpm run build:sdk

      - name: Upload SDK dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3a: Build XPath (parallel with 3b, 3c)
  # ════════════════════════════════════════════════════════════
  build-xpath:
    name: Build · XPath
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-xpath-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-xpath-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Build XPath
        run: pnpm run build:xpath

      - name: Upload XPath dist
        uses: actions/upload-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3b: Build Macro Controller (parallel with 3a, 3c)
  # ════════════════════════════════════════════════════════════
  build-macro-controller:
    name: Build · Macro Controller
    needs: build-sdk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-mc-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-mc-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      # Persist the compiled macro-looping.css across CI runs so we skip
      # the LESS compile step entirely when no *.less source changed. The
      # compile-less.mjs helper validates the cached output via a SHA-256
      # fingerprint sidecar (.cache/macro-looping.css.fingerprint.json),
      # so a stale cache is detected and recompiled automatically.
      - name: Cache macro-looping.css (LESS output)
        uses: actions/cache@v4
        with:
          path: |
            standalone-scripts/macro-controller/dist/macro-looping.css
            standalone-scripts/macro-controller/dist/.cache
          key: ${{ runner.os }}-macro-less-${{ hashFiles('standalone-scripts/macro-controller/less/**/*.less', 'scripts/compile-less.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-macro-less-

      - name: Build Macro Controller
        run: pnpm run build:macro-controller

      - name: Upload Macro Controller dist
        uses: actions/upload-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3c: Build Prompts (parallel with 3a, 3b)
  # ════════════════════════════════════════════════════════════
  build-prompts:
    name: Build · Prompts
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-prompts-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-prompts-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Prompts
        run: pnpm run build:prompts

      - name: Upload Prompts
        uses: actions/upload-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3d: Build Payment Banner Hider (parallel with 3a/3b/3c)
  #
  # No SDK dependency (instruction.ts → dependencies: []), so this
  # runs straight off `setup` instead of waiting for build-sdk like
  # build-xpath / build-macro-controller do.
  #
  # Listed in build-extension's `needs:` (above, line ~641) so the
  # extension build can download the `payment-banner-hider-dist`
  # artifact and pass the strict registry check
  # (scripts/report-standalone-registry.mjs --strict, location
  # `ciJob` → `.github/workflows/ci.yml build-payment-banner-hider`).
  # ════════════════════════════════════════════════════════════
  build-payment-banner-hider:
    name: Build · Payment Banner Hider
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-pbh-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-pbh-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Build Payment Banner Hider
        run: pnpm run build:payment-banner-hider

      # Sanity-check the local dist BEFORE uploading. If the build
      # produced an empty bundle we want to fail HERE (with build
      # logs in scope), not in build-extension's pre-build assertion
      # 5 minutes later. Reuses the shared assertion script so the
      # error format is identical to the downstream check.
      - name: Self-assert dist (pre-upload)
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "payment-banner-hider-dist (pre-upload, local)" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      - name: Upload Payment Banner Hider dist
        uses: actions/upload-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/
          retention-days: 1

      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🧱 Build · Payment Banner Hider"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact name | \`payment-banner-hider-dist\` |"
            echo "| Source path | \`standalone-scripts/payment-banner-hider/dist/\` |"
            echo "| Consumed by | \`build-extension\`, \`e2e-payment-banner-hider\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 3e: E2E · Payment Banner Hider
  #
  # Standalone smoke test — verifies the freshly-built
  # payment-banner-hider bundle by importing it in a Node sandbox
  # and running its instruction-driven self-test. Does NOT need
  # the full Chrome extension build, so it runs in parallel with
  # build-extension (saves ~3 min on the critical path).
  #
  # Gated by the shared assertion script so we never run the
  # smoke test on a broken artifact — same precise error annotation
  # as the build-extension pre-build gate.
  # ════════════════════════════════════════════════════════════
  e2e-payment-banner-hider:
    name: E2E · Payment Banner Hider
    needs: build-payment-banner-hider
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-pbh-e2e-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-pbh-e2e-

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download Payment Banner Hider dist
        id: download-pbh
        uses: actions/download-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/

      # Same artifact-trace pattern as build-extension so the smoke
      # job logs also expose the one-click artifact URL when debugging.
      - name: Resolve payment-banner-hider artifact URL + id
        id: trace-pbh-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: payment-banner-hider-dist
        run: |
          set -euo pipefail
          ARTIFACT_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\")")

          if [ -z "${ARTIFACT_JSON}" ]; then
            echo "::error title=Artifact metadata lookup failed::Could not find artifact '${ARTIFACT_NAME}' on run ${GITHUB_RUN_ID}."
            exit 1
          fi

          ARTIFACT_ID=$(echo "${ARTIFACT_JSON}" | jq -r '.id')
          BROWSER_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${ARTIFACT_ID}"
          API_URL=$(echo "${ARTIFACT_JSON}" | jq -r '.archive_download_url')

          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_id=${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "browser_download_url=${BROWSER_URL}" >> "$GITHUB_OUTPUT"
          echo "archive_download_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Assert payment-banner-hider dist artifact present
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "${{ steps.trace-pbh-artifact.outputs.artifact_name }}" \
            --artifact-id "${{ steps.trace-pbh-artifact.outputs.artifact_id }}" \
            --artifact-url "${{ steps.trace-pbh-artifact.outputs.browser_download_url }}" \
            --artifact-api-url "${{ steps.trace-pbh-artifact.outputs.archive_download_url }}" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      - name: Smoke-test bundle in Node sandbox
        # The bundle is an IIFE that registers itself on window.
        # Run it under a minimal jsdom-free shim so we get a clear
        # SyntaxError / ReferenceError if the bundle is malformed,
        # without booting a full browser.
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const bundlePath = 'standalone-scripts/payment-banner-hider/dist/payment-banner-hider.js';
            const src = readFileSync(bundlePath, 'utf8');

            if (src.length < 100) {
              console.error('::error::Bundle is suspiciously small (' + src.length + ' bytes)');
              process.exit(1);
            }

            // Minimal window/document shim so an IIFE that touches DOM
            // doesn't crash on load. We only validate the bundle parses
            // and runs to completion — no behavioural assertion here
            // (that lives in the Playwright e2e suite).
            const noop = () => {};
            const fakeWindow = {
              addEventListener: noop, removeEventListener: noop,
              RiseupAsiaMacroExt: { Projects: {} },
              location: { hostname: 'lovable.dev', href: 'https://lovable.dev/' },
            };
            const fakeDocument = {
              addEventListener: noop, removeEventListener: noop,
              readyState: 'complete',
              querySelector: () => null, querySelectorAll: () => [],
              body: { appendChild: noop }, head: { appendChild: noop },
              createElement: () => ({ style: {}, setAttribute: noop, appendChild: noop }),
            };
            globalThis.window = fakeWindow;
            globalThis.document = fakeDocument;

            try {
              new Function(src)();
              console.log('✅ Bundle loaded and executed without throwing.');
            } catch (err) {
              console.error('::error file=' + bundlePath + '::Bundle threw on execution: ' + err.message);
              process.exit(1);
            }
          "

      - name: Smoke summary
        if: always()
        run: |
          {
            echo "## 🧪 E2E · Payment Banner Hider — smoke result"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact | \`payment-banner-hider-dist\` |"
            echo "| Bundle | \`standalone-scripts/payment-banner-hider/dist/payment-banner-hider.js\` |"
            echo "| Source job | \`build-payment-banner-hider\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 4: Build Chrome Extension (depends on all standalone)
  # ════════════════════════════════════════════════════════════
  build-extension:
    name: Build · Chrome Extension
    needs: [spec-links, report-standalone-registry, typecheck-standalone, lint-standalone, build-sdk, build-xpath, build-payment-banner-hider, build-macro-controller, build-prompts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            standalone-scripts/*/node_modules
          key: ${{ runner.os }}-nm-ext-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-ext-

      - name: Install root dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Download XPath dist
        uses: actions/download-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/

      - name: Download Macro Controller dist
        uses: actions/download-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/

      - name: Download Prompts
        uses: actions/download-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/

      - name: Download Payment Banner Hider dist
        id: download-payment-banner-hider
        uses: actions/download-artifact@v4
        with:
          name: payment-banner-hider-dist
          path: standalone-scripts/payment-banner-hider/dist/

      # ── Artifact traceability ───────────────────────────────────
      # When a downstream step says "bundle missing", the first
      # question is always: WHICH artifact did we actually pull?
      # Resolve the exact `artifact-id` and `archive_download_url`
      # via the GitHub REST API and print them so a reviewer can
      # one-click open the artifact in the Actions UI without having
      # to grep through the run page. Also exported as step outputs
      # so later steps can reference them in their own summaries.
      - name: Resolve payment-banner-hider artifact URL + id
        id: trace-payment-banner-hider-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: payment-banner-hider-dist
        run: |
          set -euo pipefail

          echo "── Resolving artifact metadata for '${ARTIFACT_NAME}' ──"
          echo "   repo:    ${GITHUB_REPOSITORY}"
          echo "   run_id:  ${GITHUB_RUN_ID}"

          # List artifacts for this run, pick the one we just downloaded.
          # Using `gh api` (preinstalled on ubuntu runners) keeps this
          # zero-dep — no extra `actions/github-script` setup required.
          ARTIFACT_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?per_page=100" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\")")

          if [ -z "${ARTIFACT_JSON}" ]; then
            echo "::error title=Artifact metadata lookup failed::Could not find artifact '${ARTIFACT_NAME}' on run ${GITHUB_RUN_ID}. The download step reported success but the API does not list it — this usually means the upload step in 'build-payment-banner-hider' did not run or used a different name."
            exit 1
          fi

          ARTIFACT_ID=$(echo "${ARTIFACT_JSON}" | jq -r '.id')
          ARTIFACT_SIZE=$(echo "${ARTIFACT_JSON}" | jq -r '.size_in_bytes')
          ARTIFACT_SHA=$(echo "${ARTIFACT_JSON}" | jq -r '.workflow_run.head_sha // "unknown"')
          ARTIFACT_EXPIRES=$(echo "${ARTIFACT_JSON}" | jq -r '.expires_at')
          # `archive_download_url` is the API URL (requires auth).
          # The browser-friendly URL is the one humans can click.
          ARCHIVE_DOWNLOAD_URL=$(echo "${ARTIFACT_JSON}" | jq -r '.archive_download_url')
          BROWSER_DOWNLOAD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${ARTIFACT_ID}"

          echo "✅ Artifact resolved"
          echo "   artifact_name:        ${ARTIFACT_NAME}"
          echo "   artifact_id:          ${ARTIFACT_ID}"
          echo "   size_in_bytes:        ${ARTIFACT_SIZE}"
          echo "   head_sha:             ${ARTIFACT_SHA}"
          echo "   expires_at:           ${ARTIFACT_EXPIRES}"
          echo "   archive_download_url: ${ARCHIVE_DOWNLOAD_URL}"
          echo "   browser_download_url: ${BROWSER_DOWNLOAD_URL}"

          # Export for later steps (e.g. the assertion summary table).
          {
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "artifact_id=${ARTIFACT_ID}"
            echo "artifact_size=${ARTIFACT_SIZE}"
            echo "archive_download_url=${ARCHIVE_DOWNLOAD_URL}"
            echo "browser_download_url=${BROWSER_DOWNLOAD_URL}"
          } >> "$GITHUB_OUTPUT"

          # Top-of-summary block so the trace is the FIRST thing a
          # reviewer sees on a failed run, not buried after build logs.
          {
            echo "## 🔗 Artifact trace — \`${ARTIFACT_NAME}\`"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Artifact name | \`${ARTIFACT_NAME}\` |"
            echo "| Artifact ID | \`${ARTIFACT_ID}\` |"
            echo "| Size (bytes) | \`${ARTIFACT_SIZE}\` |"
            echo "| Head SHA | \`${ARTIFACT_SHA}\` |"
            echo "| Expires at | \`${ARTIFACT_EXPIRES}\` |"
            echo "| Browser URL (one-click) | [${BROWSER_DOWNLOAD_URL}](${BROWSER_DOWNLOAD_URL}) |"
            echo "| API archive URL | \`${ARCHIVE_DOWNLOAD_URL}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Pre-build artifact assertion ────────────────────────────
      # Hard gate run BEFORE `pnpm run build:extension` so a missing
      # payment-banner-hider artifact fails fast with a precise
      # error pointing at the exact file the extension build expects.
      # Uses the shared `scripts/assert-standalone-dist.mjs` helper
      # so the same precise failure pattern can be reused for every
      # other standalone artifact (sdk, xpath, macro-controller, …)
      # by adding one short step per artifact instead of duplicating
      # 60 lines of inline shell.
      - name: Assert payment-banner-hider dist artifact present
        run: |
          node scripts/assert-standalone-dist.mjs \
            --script-name payment-banner-hider \
            --dist-dir standalone-scripts/payment-banner-hider/dist \
            --bundle payment-banner-hider.js \
            --artifact-name "${{ steps.trace-payment-banner-hider-artifact.outputs.artifact_name }}" \
            --artifact-id "${{ steps.trace-payment-banner-hider-artifact.outputs.artifact_id }}" \
            --artifact-url "${{ steps.trace-payment-banner-hider-artifact.outputs.browser_download_url }}" \
            --artifact-api-url "${{ steps.trace-payment-banner-hider-artifact.outputs.archive_download_url }}" \
            --vite-config standalone-scripts/payment-banner-hider/vite.config.ts \
            --min-bytes 100

      - name: Build Chrome extension
        run: pnpm run build:extension

      - name: Verify no source maps in dist
        run: |
          MAP_FILES=$(find chrome-extension/dist -name '*.map' 2>/dev/null || true)
          if [ -n "$MAP_FILES" ]; then
            echo "::error::Source map files found in dist — production builds must not include .map files:"
            echo "$MAP_FILES"
            exit 1
          fi
          echo "✅ No source map files in dist"

      # Upload the bundled extension folder so downstream jobs (CSP verifier,
      # any future browser-based smoke tests) can validate the exact artifact
      # without re-running the full build.
      - name: Upload Chrome extension dist
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-dist
          path: chrome-extension/
          retention-days: 1

      - name: Build summary
        run: |
          echo "=== CI Build Complete ==="
          echo "Commit: ${GITHUB_SHA:0:8}"
          echo "Lint: OK | Tests: OK | Build: OK | No source maps: OK"

  # ════════════════════════════════════════════════════════════
  # Job 5: Verify Built Manifest CSP — early gate for browser-based jobs
  #
  # Runs the post-build CSP guard against the EXACT chrome-extension/
  # artifact produced by build-extension. Fails fast if
  # `content_security_policy.extension_pages` is missing
  # `'wasm-unsafe-eval'`, which would crash sql.js at runtime with a
  # CompileError under MV3's default `script-src 'self'`.
  #
  # Any future browser-based smoke test (Playwright, headless Chrome
  # MV3 load, etc.) MUST list this job in its `needs:` so we never burn
  # browser-runner minutes on a build that can't boot the extension.
  # ════════════════════════════════════════════════════════════
  verify-built-manifest-csp:
    name: Verify · Built manifest CSP (wasm-unsafe-eval)
    needs: build-extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: chrome-extension/

      - name: Show built manifest (for log auditability)
        run: |
          echo "─── chrome-extension/manifest.json ───"
          if [ ! -f chrome-extension/manifest.json ]; then
            echo "::error::chrome-extension/manifest.json missing in downloaded artifact"
            ls -la chrome-extension/ || true
            exit 1
          fi
          # Keep the printed snippet small but include the CSP block.
          node -e "const m=require('./chrome-extension/manifest.json'); console.log(JSON.stringify({version:m.version,name:m.name,content_security_policy:m.content_security_policy},null,2));"

      - name: Scan built manifest for wasm-unsafe-eval (script-only fallback)
        # Belt-and-braces: a pure shell grep so even if the Node validator
        # below is broken, this step still catches a missing directive.
        run: |
          if ! grep -F "'wasm-unsafe-eval'" chrome-extension/manifest.json > /dev/null; then
            echo "::error file=chrome-extension/manifest.json::Built manifest is missing 'wasm-unsafe-eval' in content_security_policy.extension_pages — sql.js will fail to compile its WASM at runtime under the default MV3 CSP."
            exit 1
          fi
          echo "✅ grep: 'wasm-unsafe-eval' present in built manifest"

      - name: Run check-built-manifest-csp validator
        # Authoritative check — same script developers run locally
        # (pnpm run check:built-csp) and that build:extension chains.
        run: node scripts/check-built-manifest-csp.mjs

  # ════════════════════════════════════════════════════════════
  # Job 6: E2E — Playwright + headed Chromium under xvfb
  #
  # Closes the carried-over E2E verification gap from
  # `.lovable/pending-issues/02-e2e-verification-react-ui.md`.
  #
  # Chrome extensions REQUIRE a real headed Chromium with
  # `--load-extension`; Playwright's headless-shell cannot load them.
  # We use the full chromium browser and drive it under xvfb-run on
  # Linux runners. Spec coverage (74 tests / 22 files) covers all 10
  # checklist items: popup, options, project CRUD, scripts CRUD,
  # XPath recorder, log export, SQLite import/export, context menus,
  # hot-reload, preview env. See `tests/e2e/`.
  #
  # Gates: needs the same artifact path as verify-built-manifest-csp
  # so we never spin up a browser on a build that can't boot.
  # ════════════════════════════════════════════════════════════
  e2e:
    name: E2E · Playwright (Chrome extension)
    needs: [build-extension, verify-built-manifest-csp]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --prefer-offline --no-frozen-lockfile

      - name: Download built Chrome extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-dist
          path: dist/

      - name: Install Playwright browsers (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Playwright E2E suite under xvfb
        env:
          CI: 'true'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" pnpm exec playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/html
          retention-days: 7

      - name: Upload Playwright artifacts (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/artifacts
          retention-days: 7
